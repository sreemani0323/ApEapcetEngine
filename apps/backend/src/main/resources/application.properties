server.port=${PORT:8080}

# ─── Virtual Threads (Spring Boot 3.4 — Project Loom) ───
spring.threads.virtual.enabled=true

# ─── Datasource: PostgreSQL (Supabase) ───
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eapcet_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.data-source-properties.sslmode=require
management.health.db.enabled=false

# ─── JPA ───
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Cache ───
spring.cache.type=caffeine
spring.cache.cache-names=collegeNames,branchComparison,trendingBranches,dashboardStats,districtSummary,exploreColleges,collegeDetail
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ─── ML Service ───
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ─── OpenAPI / Swagger ───
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Actuator ───
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ─── Server Hardening ───
server.error.include-stacktrace=never
server.error.include-message=always
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# ─── Logging ───
logging.level.root=INFO
logging.level.com.eapcet=INFO
logging.level.org.springframework.web.client=DEBUG

# ─── Resilience4j Circuit Breaker ───
resilience4j.circuitbreaker.instances.mlService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.mlService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.mlService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.mlService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.mlService.slowCallRateThreshold=80
resilience4j.circuitbreaker.instances.mlService.slowCallDurationThreshold=10s
