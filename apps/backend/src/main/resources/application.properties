server.port=${PORT:8080}

# ─── Virtual Threads (Spring Boot 3.4 — Project Loom) ───
spring.threads.virtual.enabled=true

# ─── Datasource: PostgreSQL (Supabase / local Docker) ───
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eapcet_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:localdev}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=20000
# prefer = try SSL, fall back for local Postgres without SSL
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:prefer}
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ─── JPA ───
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.datasource.hikari.initialization-fail-timeout=30000

# ─── Cache (Caffeine — tuned in CacheConfig.java) ───
spring.cache.type=caffeine

# ─── ML Service ───
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ─── OpenAPI / Swagger ───
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Actuator ───
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# ─── Server Hardening ───
server.error.include-stacktrace=never
server.error.include-message=always
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# ─── Logging ───
logging.level.root=WARN
logging.level.com.eapcet=INFO

# ─── Resilience4j Circuit Breaker ───
resilience4j.circuitbreaker.instances.mlService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.mlService.failureRateThreshold=60
resilience4j.circuitbreaker.instances.mlService.waitDurationInOpenState=15s
resilience4j.circuitbreaker.instances.mlService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.mlService.slowCallRateThreshold=80
resilience4j.circuitbreaker.instances.mlService.slowCallDurationThreshold=45s
