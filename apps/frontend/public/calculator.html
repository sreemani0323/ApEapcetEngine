<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Reverse Calculator - ApEapcetEngine</title>
    <link rel="stylesheet" href="style.css?v=4.0.0" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
    <header class="page-header">
        <div class="header-container">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <a href="index.html" class="site-title-link">
                    <h1 id="siteTitle"><i class="fas fa-graduation-cap"></i> ApEapcetEngine</h1>
                </a>
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <i class="fas fa-bars"></i>
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <nav class="main-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="analytics.html" class="nav-link"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a>
                <a href="map.html" class="nav-link"><i class="fas fa-map-marked-alt"></i> <span>Map View</span></a>
                <a href="calculator.html" class="nav-link active"><i class="fas fa-calculator"></i> <span>Calculator</span></a>
                <a href="branch-comparison.html" class="nav-link"><i class="fas fa-code-branch"></i> <span>Compare Branches</span></a>
            </nav>
            <div class="header-controls">
                <button id="refreshBtn" class="btn-secondary" style="margin-right: 1rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-sync-alt"></i> <span>Refresh</span>
                </button>
                <label class="dark-mode-toggle" for="darkModeSwitch" title="Toggle Dark/Light Mode">
                    <input type="checkbox" id="darkModeSwitch" />
                    <div class="toggle-slider"></div>
                </label>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h2><i class="fas fa-calculator"></i> Reverse Rank Calculator</h2>
                <p>Find out what rank you need for your dream college</p>
            </div>
        </section>

        <div class="container">
            <form id="calculatorForm" class="predict-form" style="max-width: 700px; margin: 2rem auto;">
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="form-group">
                        <label for="collegeName">College Name</label>
                        <input type="text" id="collegeName" placeholder="Search college..." 
                               autocomplete="off" style="width: 100%;" />
                        <div id="collegeDropdown" class="college-dropdown"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="branch">Branch</label>
                        <select id="branch" required style="width: 100%;">
                            <option value="">First select a college</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required style="width: 100%;">
                            <option value="oc">OC (Open Category)</option>
                            <option value="sc">SC</option>
                            <option value="st">ST</option>
                            <option value="bca">BC-A</option>
                            <option value="bcb">BC-B</option>
                            <option value="bcc">BC-C</option>
                            <option value="bcd">BC-D</option>
                            <option value="bce">BC-E</option>
                            <option value="oc_ews">OC (EWS)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required style="width: 100%;">
                            <option value="boys">Boys</option>
                            <option value="girls">Girls</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="probability">Desired Admission Chance</label>
                        <select id="probability" required style="width: 100%;">
                            <option value="90">90% - Very High</option>
                            <option value="80">80% - High</option>
                            <option value="65">65% - Good</option>
                            <option value="50" selected>50% - Moderate</option>
                            <option value="35">35% - Reachable</option>
                            <option value="20">20% - Ambitious</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                    <i class="fas fa-calculator"></i> Calculate Required Rank
                </button>
            </form>
            
            <div id="result" style="display: none; max-width: 700px; margin: 2rem auto;"></div>
            <div id="loading" class="smart-loader-overlay" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(8,8,20,0.78); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); align-items:center; justify-content:center;"><div style="background:var(--surface,#fff); border-radius:16px; box-shadow:0 8px 40px rgba(67,97,238,0.25); padding:2rem 2.5rem; display:flex; flex-direction:column; align-items:center; gap:0.85rem; max-width:320px; width:calc(100% - 2.5rem); text-align:center;"><lottie-player src="searching.json" background="transparent" speed="1" loop autoplay style="width:150px;height:150px;"></lottie-player><p style="margin:0;font-weight:600;font-size:0.9rem;color:var(--text,#1a1a2e);">Calculating results...</p></div></div>
        </div>
    </main>

    <div class="scroll-buttons" id="scrollButtons">
        <button id="scrollTopBtn" title="Scroll to Top"><i class="fa-solid fa-arrow-up"></i></button>
        <button id="scrollBottomBtn" title="Scroll to Bottom"><i class="fa-solid fa-arrow-down"></i></button>
    </div>

    <footer class="page-footer">
        <div class="footer-container">
            <p>&copy; 2025 ApEapcetEngine by Nallimilli Mani. All rights reserved.</p>
        </div>
    </footer>

    <script src="validation-popups.js?v=3.0.0"></script>
    <script src="nav-drawer.js?v=3.0.0"></script>
    <script src="calculator.js?v=3.0.0"></script>
    
    <script>

        document.addEventListener('DOMContentLoaded', function() {
            const scrollButtons = document.getElementById('scrollButtons');
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            const scrollBottomBtn = document.getElementById('scrollBottomBtn');

            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    scrollButtons.classList.add('visible');
                } else {
                    scrollButtons.classList.remove('visible');
                }
            });

            scrollTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            scrollBottomBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            });

            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.addEventListener('click', function() {

                localStorage.removeItem('calculatorCollegesData');
                localStorage.removeItem('calculatorCollegesDataTimestamp');

                document.getElementById('result').style.display = 'none';
                document.getElementById('collegeName').value = '';
                document.getElementById('collegeDropdown').innerHTML = '';

                const branchSelect = document.getElementById('branch');
                branchSelect.innerHTML = '<option value="">First select a college</option>';

                document.getElementById('loading').style.display = 'flex';

                loadColleges();
            });
        });

        window.addEventListener('beforeunload', function() {

            const isNavigation = sessionStorage.getItem('isNavigation');

            if (!isNavigation) {

                localStorage.removeItem('calculatorCollegesData');
                localStorage.removeItem('calculatorCollegesDataTimestamp');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            sessionStorage.setItem('isNavigation', 'true');
        });

        window.addEventListener('load', function() {
            sessionStorage.removeItem('isNavigation');
        });
    </script>
    
    <style>
        /* Input and Select Styling */
        #calculatorForm input[type="text"],
        #calculatorForm select {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius);
            background: var(--card-light);
            color: var(--color-text-primary);
            transition: all 0.3s ease;
        }
        
        #calculatorForm input[type="text"]:focus,
        #calculatorForm select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        #calculatorForm label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        
        .college-dropdown {
            position: absolute;
            background: var(--card-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
            display: none;
            box-shadow: var(--shadow);
        }
        .college-dropdown.show {
            display: block;
        }
        .college-dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
        }
        .college-dropdown-item:hover {
            background: var(--color-accent-light);
        }
        .result-card {
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: white;
            padding: 2rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-lg);
        }
        .result-card h2 {
            color: white;
            margin-bottom: 1rem;
        }
        .result-card .rank-number {
            font-size: 3rem;
            font-weight: 700;
            margin: 1rem 0;
        }
        .result-details {
            background: var(--card-light);
            padding: 1.5rem;
            border-radius: var(--radius);
            margin-top: 1rem;
        }
        body.dark-mode .college-dropdown {
            background: var(--card-dark);
            border-color: var(--border-dark);
            color: var(--color-text-light);
        }
        body.dark-mode .college-dropdown-item {
            border-color: var(--border-dark);
            color: var(--color-text-light);
        }
        body.dark-mode .college-dropdown-item:hover {
            background: #30363d;
        }
        body.dark-mode .result-details {
            background: var(--card-dark);
            color: var(--color-text-light);
            border-color: var(--border-dark);
        }
    </style>
</body>
</html>
