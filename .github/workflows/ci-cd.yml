name: EAPCET CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ═══════════════════════════════════
  # Stage 1: Backend Build & Test
  # ═══════════════════════════════════
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: spring_backend/target/*.jar
          retention-days: 3

  # ═══════════════════════════════════
  # Stage 2: Frontend Build & Lint
  # ═══════════════════════════════════
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

  # ═══════════════════════════════════
  # Stage 3: Security Scan (SAST + Container)
  # ═══════════════════════════════════
  security:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      # Snyk for dependency vulnerability scanning
      - name: Snyk Security Scan (Backend)
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test

      # Trivy for Docker image scanning
      - name: Build Backend Image
        run: docker build -t eapcet-backend:scan ./spring_backend

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eapcet-backend:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # ═══════════════════════════════════
  # Stage 4: Deploy (Docker Compose)
  # ═══════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [security]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        env:
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          docker compose build
          docker compose up -d
          echo "Deployment complete. Services starting..."

      - name: Health Check
        run: |
          sleep 30
          curl --fail http://localhost:8080/actuator/health || exit 1
          echo "Backend healthy ✓"
