name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══ Backend: Build + Test ═══
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build & Test
        run: |
          chmod +x ./mvnw
          ./mvnw clean verify -DskipTests
      - name: Check JAR builds
        run: ls -la target/*.jar

  # ═══ Frontend: Lint + Build ═══
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  # ═══ ML Service: Validate ═══
  ml-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/ml-service/requirements.txt
      - name: Install
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -c "import app; print('ML service module loads OK')"
